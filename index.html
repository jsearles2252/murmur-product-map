e-height:1.3;letter-spacing:-.01em}.pdc{font-size:10px;color:#777;line-height:1.65;margin-bottom:9px}.pli{list-style:none}.pli li{font-size:9.5px;color:#888;padding:4px 0;border-bottom:0.5px solid rgba(0,0,0,0.05);display:flex;gap:5px;line-height:1.4}.pli li:last-child{border:none}.pli li::before{content:"";color:#ccc;flex-shrink:0}.px{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,0.06);border:none;cursor:pointer;font-size:13px;color:#999;font-family:inherit;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .15s}.px:hover{background:rgba(0,0,0,0.12);color:#444}.zc{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;flex-direction:row;align-items:center;gap:0;z-index:100;background:rgba(255,255,255,0.92);border-radius:99px;padding:6px 10px;box-shadow:0 2px 12px rgba(0,0,0,0.1);backdrop-filter:blur(8px)}.zb{width:28px;height:28px;border-radius:99px;border:none;background:none;color:#555;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background .15s}.zb:hover{background:rgba(0,0,0,0.06)}.zb-fit{font-size:13px;margin-left:4px;border-left:0.5px solid rgba(0,0,0,0.1);padding-left:8px;width:auto}.zpct{font-size:11px;color:#666;min-width:36px;text-align:center;font-variant-numeric:tabular-nums;user-select:none}@keyframes nodeIn{from{opacity:0;transform:translateY(calc(-50% - 8px))}to{opacity:1;transform:translateY(-50%)}}

</style></head><body><div class="hdr">  <div class="hdr-l"><div style="display:flex;align-items:center;gap:10px"><div class="b">iConnekt™</div><div style="display:inline-flex;align-items:center;gap:6px;background:#F2F2F7;border:1px solid rgba(0,0,0,0.08);padding:4px 14px;border-radius:99px"><span style="width:6px;height:6px;border-radius:50%;background:#007AFF;flex-shrink:0;display:inline-block"></span><span style="font-size:10.5px;font-weight:500;color:#1C1C1E;letter-spacing:-.01em">Built for agents. One intake. Every market.</span></div></div><div class="s">Agent Journey Map · V2 · Full Scope · 2026</div></div>  <div class="hdr-r">
  <div style="display:flex;align-items:center;gap:8px;margin-right:20px;background:rgba(0,0,0,0.04);padding:6px 12px;border-radius:99px;border:1px solid rgba(0,0,0,0.08);">
    <span style="font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#3A3A3A;margin-right:4px;">Phases</span>
    <span style="display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:.05em;color:white;background:#007AFF;padding:4px 11px;border-radius:99px;white-space:nowrap">● 1 · Foundation</span>
    <span style="display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:.05em;color:white;background:#34C759;padding:4px 11px;border-radius:99px;white-space:nowrap">● 2 · Post-bind</span>
    <span style="display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:.05em;color:white;background:#FF3B30;padding:4px 11px;border-radius:99px;white-space:nowrap">● 3 · Quote & Place</span>
    <span style="display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:.05em;color:white;background:#AF52DE;padding:4px 11px;border-radius:99px;white-space:nowrap">● Internal</span>
  </div>
  <span class="hint">Click root to expand · Click any branch to drill down · Click a node for full detail</span></div></div><div id="cv"><div id="w"><svg id="s"></svg></div></div><div class="zc">  <button class="zb" onclick="zm(0.87)">− </button>  <span class="zpct" id="zpct">100%</span>  <button class="zb" onclick="zm(1.15)">+</button>  <button class="zb zb-fit" onclick="rv()" title="Reset view">⤢ </button></div><script>const INFO={root:{tag:"iConnekt · AmSuisse · V2",c:"#1a1a18",title:"iConnekt Platform  Full Scope",desc:"iConnekt is a logic-first, identity-driven orchestration platform for insurance distribution. Not a portal, not a wrapper. A compliance-gated, state-driven carrier access engine built to scale across agencies, carriers, and integrations.",items:["Identity-first: every function requires authenticated, role-resolved context","Compliance-gated: carrier access, quoting, and downloads all blocked until compliance is valid","State-driven: carrier access, compliance, and appointments all operate as state machines","Vendor-neutral: integration adapters isolate carrier/vendor logic from core platform","Built to scale to thousands of agencies, multiple MGAs, multiple rating integrations","Salesforce is CRM system of record; EPIC is policy system of record; iConnekt is the distribution operating layer"]},identity:{tag:"Phase 1 · Foundation",c:"#1a3d22",title:"Identity & SSO Foundation",desc:"Auth0 is the identity provider. Every user, session, and downstream access decision depends on it. Salesforce is the source of truth for internal AmSuisse users.",items:["Auth0 handles all authentication: login, MFA, password reset, token issuance, session management","Identity chain: Salesforce User ID →  Auth0 User ID  iConnekt User ID  all three must be linked","At launch: all existing Salesforce users bulk-imported into Auth0 and iConnekt","New Salesforce users trigger provisioning: Auth0 identity  iConnekt user record  role claims  activation email","JWT token contains: Auth0 user ID, iConnekt user ID, agency ID, role claim, compliance snapshot flag, expiry","SSO is not a hyperlink  it is a server-side orchestrated launch through CarrierSSOAdapter","SSO protocols: SAML 2.0, OIDC, OAuth2, signed URL redirect, token exchange  per carrier capability","Every SSO launch logged: user ID, agency ID, carrier ID, timestamp, success or failure"]},"auth-entry":{tag:"Phase 1",c:"#1a3d22",title:"Authentication entry points",desc:"Public access is strictly limited. Everything operational requires a valid authenticated session.",items:["Public only: login page, password reset, agency signup request, marketing content","All functional modules require session validation  carrier discovery, compliance, Quote Now, downloads","Auth0 redirects with signed JWT; iConnekt validates server-side on every request","Session payload: Auth0 user ID, iConnekt user ID, agency ID, role claim, compliance flag, expiry/issued timestamps","Tokens: short-lived access tokens, managed and refreshable via Auth0, revocable centrally"]},"sso-arch":{tag:"Phase 1",c:"#1a3d22",title:"SSO architecture",desc:"SSO launch is an orchestrated server-side process, not a redirect link. Every launch is validated, logged, and error-aware.",items:["Pre-launch checks: authenticated session, role authorization, compliance complete, carrier access active, E&O valid, license valid for state, appointment satisfied","CarrierSSOAdapter layer: constructs launch payload, signs or encrypts as required, transmits server-side, captures outcome","Carrier SSO protocols: SAML, OIDC, OAuth2, signed URL, custom token exchange","Launch logged: user ID, agency ID, carrier ID, timestamp, carrier response, success or failure","Failure response: structured error with reason, remediation path, no generic Access Denied","SSO never launches silently  every outcome captured and logged"]},"role-routing":{tag:"Phase 1",c:"#1a3d22",title:"Role-aware routing",desc:"After login, iConnekt resolves role, agency, and compliance state to determine exactly where the user lands.",items:["Post-login routing: Platform Admin  Admin UI, Compliance Admin  Compliance dashboard, Agency Owner/Admin  Agency dashboard, Producer  Producer dashboard","If compliance incomplete at login: route to Required Actions page  not functional dashboard","Role resolution: Auth0 token  iConnekt user  agency association  role claim  compliance snapshot","RBAC matrix defines: module access, action permissions, data visibility scope, approval authority, override capabilities","Roles: Platform Super Admin, Compliance Admin, Carrier Admin, Agency Owner, Agency Admin, Producer/Agent, CSR, Finance, Read-only"]},"user-mgmt":{tag:"Phase 1",c:"#1a3d22",title:"User & agency management",desc:"Users exist within defined authority boundaries. No self-elevation. No silent role changes. All logged.",items:["Internal AmSuisse users: originate in Salesforce  provisioned into Auth0  iConnekt user record created","Agency users: created by Agency Owner or Agency Admin inside iConnekt  Auth0 identity created via Management API","User creation must log: who created, when, role assigned, all subsequent modifications","Deactivation: Auth0 identity disabled, active sessions invalidated, API tokens revoked, access ceases immediately","Historical data preserved on deactivation: commission records, appointment submissions, carrier requests, compliance uploads","No user can self-elevate permissions. No agent can approve carrier access. No compliance gate can be bypassed."]},agency:{tag:"Phase 1 · Structure",c:"#0d2f3f",title:"Agency & account structure",desc:"The agency is the primary business entity. Every permission decision, compliance gate, carrier access, and user scope resolves through the agency object.",items:["Agency statuses: Active, Pending Setup, Compliance Incomplete, Compliance Review Pending, Suspended, Deactivated","Agency cannot be Active until compliance gates are satisfied  enforced system-wide","Parent/child agency structures supported: data scopes control inheritance across branches, teams, locations","Inheritance options: no inheritance, view-only, appointment inheritance, document inheritance, commission roll-up, full operational inheritance","Cross-agency access requires explicit assignment  no user sees another agency's data by default"]},"agency-onboard":{tag:"Phase 1",c:"#0d2f3f",title:"Agency onboarding",desc:"Universal profile built once. Gates everything downstream until complete.",items:["Required fields: legal name, DBA, FEIN, NPN, entity type, resident state, addresses, primary contact","Principal/owner info with compliance background questions: bankruptcy, disciplinary history, license suspensions, E&O claims","Producer setup: NPN, states licensed, lines of authority, role, quote authority","License uploads with state, line, effective/expiration dates, document upload with versioning","E&O: carrier, policy number, limits, deductible, effective/expiration, named insured, covered entities, certificate upload","Documents: W-9, ACH, agency agreement, carrier-specific forms  all stored with version history","Banking: routing/account numbers encrypted/tokenized  never stored in plain form","Onboarding completion % tracked; agency cannot access gated modules until complete"]},"agency-roles":{tag:"Phase 1",c:"#0d2f3f",title:"Roles & permissions",desc:"9 roles with data scopes. Authority boundaries enforced technically, not culturally.",items:["Platform Super Admin: full control across all agencies, audit logs, support impersonation","Compliance Admin: review, approve, reject compliance artifacts; transition carrier access states","Carrier Relationship Admin: configure carrier directory records, carrier metadata, appetite rules","Agency Owner: full agency control  profile, users, quotes, appointments, commissions, E&O, integrations","Agency Admin/Operations Manager: daily operations, users, licenses, appointments, quotes, reports","Producer/Agent: start quotes, submit business, view assigned accounts, request appointments if allowed","CSR/Account Manager: accounts, quotes, docs, renewals, endorsements, tasks","Finance/Accounting: commissions, statements, exports  no quote/admin rights","Read-only/Auditor: view-only assigned data"]},compliance:{tag:"Phase 1 · Gating Engine",c:"#3d2800",title:"Compliance engine",desc:"Compliance is not a checklist page. It is a computed, platform-wide state variable that actively gates carrier access, quoting, appointments, and downloads. Built as a state machine.",items:["Compliance states: Complete, Incomplete, Pending Review, Expired, Rejected  each with defined downstream effects","Complete: all gated modules allowed subject to carrier access state","Incomplete: Quote Now blocked, carrier SSO blocked, appointment submission blocked, downloads restricted","Pending Review: Quote Now and SSO disabled; awaiting platform admin action","Expired: immediate suspension of Quote Now, carrier SSO, appointments, downloads  alert triggered","Rejected: all gated modules blocked; rejection reason shown clearly; Required Action workflow activated","Compliance computed dynamically from: profile completion, license validity, E&O validity, review outcomes","Compliance state must be enforced server-side  never UI-only hiding"]},"compliance-gate":{tag:"Phase 1",c:"#3d2800",title:"Compliance decision tree",desc:"Every gated action must evaluate the agency's computed compliance state before execution. Deterministic. Cannot be bypassed.",items:["Step 1: authenticated? If no  redirect to login, no carrier visibility, no Quote Now","Step 2: valid agency? If no  block all modules, log event","Step 3: compliance state evaluation  drives all downstream access","Step 4: carrier access state validation on top of compliance  both must be valid","Combined matrix: compliance state × carrier access state × role  determines exactly what is available","Server-side enforcement on every request  direct URL bypass attempts blocked and logged"]},"compliance-license":{tag:"Phase 1",c:"#3d2800",title:"License management",desc:"Licenses are hard gates for carrier access and quoting. Tracked per state and line, with automated expiration enforcement.",items:["Each license: type, number, issuing state, effective/expiration dates, holder, uploaded document with versioning","License expiry: compliance transitions to Expired automatically; carrier access in affected states disabled","Renewal alerts triggered X days before expiration based on notification preferences","Agency Admin  Licenses to add, update, upload  unblocks access automatically when validated"]},"compliance-eo":{tag:"Phase 1",c:"#3d2800",title:"E&O management",desc:"E&O is mandatory for carrier access and appointment workflows. Monitored continuously with automated expiration enforcement.",items:["E&O fields: carrier name, policy number, coverage amount, effective/expiration, uploaded certificate","Coverage threshold validation: configurable by platform admin  minimum limits enforced","Expiry: compliance transitions to Expired; Quote Now blocked immediately; carrier SSO blocked","Auto-unblocks: once renewed certificate uploaded and validated, blocked actions become available"]},"compliance-banking":{tag:"Phase 1",c:"#3d2800",title:"Banking & payment data",desc:"Required for commission routing and billing integration. iConnekt is NOT a payment processor.",items:["Fields: bank name, account type, routing/account numbers (encrypted/tokenized), authorized signer","Encryption at rest; restricted role access; audit logging on create/update/view","Billing is external  iConnekt passes metadata via secure API, receives transaction status only","Confirmation flows required before any banking data modification"]},carriers:{tag:"Phase 1 · Carrier Access",c:"#2a1040",title:"Carrier directory & access",desc:"The Carrier Directory is not a list of logos. It is a controlled access engine. Visibility does not equal eligibility. Eligibility does not equal activation. Structurally separated and enforced.",items:["All carriers displayed: Active, Pending, Available to Request, Not Eligible  transparency by default","Active: agency authorized and eligible to quote  Quote Now enabled if compliance complete and appointment satisfied","Pending: request submitted, under review  Quote Now disabled","Available to Request: carrier available but not yet requested  structured Request Access action shown","Not Eligible: specific reason shown (compliance, state licensing, classification, carrier restriction)","Carrier access state evaluated in conjunction with compliance state  both must be valid for Quote Now","All state transitions logged, timestamped, attributed to user or system process"]},"carrier-card":{tag:"Phase 1",c:"#2a1040",title:"Carrier cards & info panels",desc:"Each carrier card communicates operational state clearly. Not just a button  context is always shown.",items:["Card shows: carrier name, supported lines, agency access state, appointment status, compliance impact indicator, Quote Now availability","Visual state badges: Operationally Active, Operationally Blocked, Pending Review, Available to Request, Not Eligible","If blocked due to compliance: reason reflected in card state","If appointment required before quoting: clearly displayed on card","Agency vs agent access: carrier access is agency-scoped  agents cannot independently request or activate","If agency suspended or compliance incomplete: all agents under that agency inherit restriction immediately"]},"carrier-request":{tag:"Phase 1",c:"#2a1040",title:"Request carrier access",desc:"Structured workflow, not ad hoc. Pre-fills agency data. Prevents incomplete or duplicate submissions.",items:["Pre-fills: agency profile, validated licensing, E&O documentation, banking status from existing records","Workflow states: Draft  Submitted  Under Review  Approved / Denied / Needs Additional Information","Approval: automatically updates Carrier Access State to Active, enables Quote Now where appropriate","Denial: updates state, surfaces reason to agency, triggers Required Action alert","Duplicate prevention: system blocks resubmission of pending or approved request"]},dashboard:{tag:"Phase 1 · Command Center",c:"#3a1800",title:"Home dashboard",desc:"Not decorative. The dashboard is the structured presentation of system truth. Every widget is backed by server-side validation. Role-specific variants.",items:["Platform Admin: system-wide compliance overview, pending reviews, pending appointments, carrier config status, integration errors","Agency Owner/Admin: agency compliance status, license/E&O expiration warnings, carrier access summary, pending requests, banking status, required actions","Producer: compliance status indicator, carrier readiness, Quote Now eligibility, pending requests","Snapshot cards: Compliance Status, Licensing Status, E&O Status, Carrier Access Summary, Appointment Status, Banking Status","Alert severity: Critical (immediate restriction), Warning (at risk within threshold), Informational (workflow update)","Critical alerts persist until resolved. All acknowledgments logged."]},"dashboard-alerts":{tag:"Phase 1",c:"#3a1800",title:"Alerts & required actions",desc:"Actionable items surfaced clearly and hierarchically. Never buried.",items:["License expiring within configured threshold","E&O expiring within configured threshold","Compliance rejected or pending review","Carrier access decision updates (approved, denied)","Banking information incomplete","Integration failures affecting the agency","New carrier available, appetite change, carrier outage","All alert acknowledgments logged with user ID and timestamp"]},classCode:{tag:"Phase 1 · NEW",c:"#0a2818",title:"Class code search",desc:"NEW from Full Scope v5-8. Not a search utility  a reverse-filter discovery engine that directly informs carrier eligibility and Quote Now readiness.",items:["Reverse filter model: loads ALL available classifications for agency's eligible carriers on open","As user types: list narrows in real time, non-matching entries disappear  no page reload","Filter by: class code number, partial code, business description, industry keyword, synonyms","Class code  carrier appetite mapping: each code maps directly to which carriers accept it","Combined eligibility: class code match PLUS compliance state PLUS carrier access state PLUS appointment state","No match state: No Matching Classification Found with guidance to refine or contact for review","Class code selection feeds Quote Now: eligible carrier list updates dynamically, ineligible carriers marked"]},"class-appetite":{tag:"Phase 1",c:"#0a2818",title:"Class code appetite mapping",desc:"Every class code maps to carrier appetite rules. Selection is a pre-qualification step.",items:["Each carrier defines: supported class codes, restricted class codes, conditional acceptance codes, state-specific limitations","Appetite rules evaluated with: agency compliance state, carrier access state, appointment state, licensing state","Carrier directory dynamically adjusts when class code is selected  only eligible carriers remain available","No-match with no eligible carriers: class code recognized, no eligible carriers, reason shown","The system must be deterministic  it must not guess or imply eligibility"]},ux:{tag:"Phase 1 · Platform",c:"#1a4d62",title:"UX & design system",desc:"NEW from Full Scope v5-8. Built once, used everywhere. The design system is an architectural layer, not aesthetic decoration.",items:["State-driven UI: every element reflects backend state  compliance states, carrier access states, appointment states, license states","Status badges: same visual badge for Pending in Compliance, Carrier Access, and Appointments  identical everywhere","Empty states: explicitly designed  no blank screens; always provide context, guidance, and action pathways","Restricted states: clearly explain what is blocked, why, and what action resolves it","Pending states: current status, timestamp, next expected step  never leave users guessing","Loading, success, error states: every async action has visible loading, success confirmation, structured error feedback","Accessibility: WCAG-aligned contrast ratios, keyboard navigation, screen reader compatibility, focus states"]},"ux-nav":{tag:"Phase 1",c:"#1a4d62",title:"Navigation & layout",desc:"Navigation is a projection of role, compliance state, and carrier eligibility  not static menus.",items:["Navigation computed at session initialization based on: role claims, compliance status, carrier access state, agency association","Role-based visibility: Platform Admin sees all; Agency Owner/Admin sees operational modules; Producer sees limited set","Navigation updated on state change: if compliance expires mid-session, navigation updates accordingly","Status banners: compliance alerts and required actions always visible at top of every page  not buried"]},postbind:{tag:"Phase 2 · Post-bind",c:"#2a1e08",title:"Post-bind & book of business",desc:"Policy issued, commissions tracked, activity logged, data synced.",items:["Policy record: number, carrier, product, effective/expiration, premium, commission, status, documents","Commission record: Estimated  Pending  Received  Paid  created at bind","Activity log: full timeline from created through API sent, portal opened, brokerage submitted, broker assigned, bound, synced","EPIC and Salesforce sync visible on each policy record","Renewals: 90/60/30-day views, remarket recommended, retained/lost tracking"]},commissions:{tag:"Phase 2",c:"#2a1e08",title:"Commission visibility & reporting",desc:"Commission data ingested from external systems (MGA platforms, carrier feeds, Surefyre). iConnekt normalizes, secures, and presents it. Not the system of record.",items:["Summary views: Total Written Premium, Earned Commission, Paid Commission, Pending, Chargebacks, by Carrier, by Line of Business","Time ranges: Month to Date, Quarter to Date, Year to Date, Custom Date Range","Transaction-level: policy ID, carrier, line, effective date, premium, commission rate, amount, payment status","Role visibility: producer sees own only; manager sees team; owner sees all  enforced server-side","Data ingestion: scheduled sync from external systems with validation, duplicate prevention, error logging"]},"doc-distro":{tag:"Phase 1 · NEW",c:"#2a1e08",title:"Document distribution",desc:"NEW from Full Scope v5-8. Not a file repository  a permission-controlled distribution layer tied to compliance state, carrier access, and appointment status.",items:["Document types: carrier forms, underwriting guidelines, marketing materials, commission statements, appointment docs, compliance forms","Access gated by: user role, agency compliance state, carrier access state, appointment status","Compliance Complete: downloads permitted subject to carrier and role rules","Compliance Incomplete/Expired/Rejected: carrier documents blocked; remediation documents accessible","Carrier-specific docs require: carrier access Active AND appointment Approved","All downloads logged: user ID, agency ID, document ID, carrier ID, timestamp"]},"epic-sf":{tag:"Phase 2",c:"#2a1e08",title:"EPIC / Salesforce sync",desc:"iConnekt is the distribution operating layer. EPIC owns accounts and policies. Salesforce is CRM system of record.",items:["Source-of-truth rules: iConnekt owns onboarding, appointment workflow, quote operations; EPIC owns accounts, policies, production; Salesforce owns CRM, pipeline, relationships","iConnekt sends to EPIC: new account, submission, bound policy, documents, activity notes, producer info, Salesforce IDs","iConnekt sends to Salesforce: agency, contact, user/producer, appointment request, quote/submission summary, bound policy summary","One-way initially; two-way after source-of-truth rules established"]},quoting:{tag:"Phase 3 · Quote & Place",c:"#0f1f38",title:"Quote & Place",desc:"The main workbench. One intake, one quote record, multiple placement paths. Compliance and carrier access must both be valid before any Quote Now launch.",items:["Quote Now pre-launch validation: authenticated session, active agency, compliance Complete, license valid, E&O valid, carrier access Active, appointment satisfied","If any condition fails: Quote Now disabled with specific reason and remediation link  never generic denial","Quote statuses: Draft  Intake Started  Market Matched  API Running  Portal In Progress  Brokerage Package Incomplete  Submitted to Brokerage  Out to Market  Quoted  Bind Ready  Bind Requested  Bound  Declined  Expired  Lost  Closed"]},"start-quote":{tag:"Phase 3",c:"#0f1f38",title:"Start quote",desc:"Routing-critical data first. Carrier questions only when that carrier is selected.",items:["Screen 1: business/personal, product line, state, effective date, industry/class  feeds class code search and Market Match","Screen 2: named insured, DBA, entity type, FEIN, addresses, contact, years in business","Screen 3: product-specific fields  only after product is known","Class code selected here feeds carrier eligibility filtering in Market Match"]},intake:{tag:"Phase 3",c:"#0f1f38",title:"Common intake",desc:"Risk data entered once, shared across all three lanes. Universal question bank eliminates re-entry.",items:["Named insured, DBA, entity type, FEIN, mailing and risk addresses, contact, phone, email, website, years in business","Operations description, revenue, payroll, prior carrier, current premium, loss history, effective date, requested coverages","Product-specific: GL class, property values, construction, occupancy, payroll by class, liquor receipts, cannabis, coastal location","Universal question bank: every question tagged by carrier, product, state, reusable answer, expiration  answered once globally","Already answered = do not ask again unless expired or carrier requires different answer"]},"market-match":{tag:"Phase 3 · Core",c:"#0f1f38",title:"Market Match ",desc:"The signature screen. Routes risk to all possible markets. Every blocked carrier shows specific reason and recovery. Class code selection drives which carriers appear.",items:["Direct Appointment / API: eligible API carriers  shown FIRST (fastest path)","Direct Appointment / Portal: appointed non-API carriers with Open Portal Workspace","AmSuisse Brokerage: market categories or named carriers","Unavailable/blocked: specific reason for every carrier  not appointed, state unavailable, class not eligible, missing license, E&O expired  plus recovery action","Class code pre-filters which carriers appear: carrier list already reflects class code appetite compatibility"]},"quote-strategy":{tag:"Phase 3",c:"#0f1f38",title:"Quote strategy",desc:"System recommends placement path. Brokerage is NEVER automatic.",items:["Direct Recommended: clean risk, fits direct appointment markets","Direct First / Brokerage If Needed: DEFAULT for most risks","Brokerage Recommended: complex, declined by direct, coverage gap","Brokerage Required: E&S, cannabis, coastal, high-risk class","No Market Found: risk does not match any current market"]},"api-lane":{tag:"Phase 3",c:"#0f1f38",title:"Direct API quote",desc:"Direct appointment plus API. Most seamless experience.",items:["Run Quote, Quote All Eligible, Complete & Run Quote, Refresh Quote","Bind Now / Request Bind: API bind if supported by carrier","Statuses: Eligible, Missing Info, Running Quote, Quoted, Declined, Referral Required, API Error, Expired, Bind Ready, Bound","Never show only API Error  always show field/eligibility issue and what to do next"]},"portal-lane":{tag:"Phase 3",c:"#0f1f38",title:"Portal workspace",desc:"Appointed non-API carriers. Agent quotes without leaving iConnekt.",items:["Left panel: Quote Packet  insured, risk data, coverage selections, copy buttons for manual entry","Center panel: carrier portal session (embedded webview, controlled browser, or secure pop-out)","Right panel:  quote options","Broker actions: Assign Broker, Request More Info, Send to Market, Add Market Response, Upload Quote, Send Quote to Agent, Request Bind, Mark Bound","Agent-visible: broker assigned, status, estimated turnaround, info requests, returned quotes"]},"broker-queue":{tag:"Brokerage Desk",c:"#380820",title:"Submissions queue",desc:"All agent brokerage submissions land here. Capacity controls filter quality at entry.",items:["Capacity controls: direct markets available? risk eligible? required docs attached? complete? duplicate check? sufficient premium?","Filters: New, Incomplete, Assigned to Me, More Info Needed, Out to Market, Quotes Received, Bind Requests","Duplicate detection and minimum submission quality checks applied on arrival"]},"broker-assign":{tag:"Brokerage Desk",c:"#380820",title:"Assign broker",desc:"Internal owner assigned. Agent sees broker name from quote record.",items:["Assign Broker: assigns internal case owner","Agent notification: broker name assigned to your submission","Broker can reassign or escalate to senior broker"]},"broker-market":{tag:"Brokerage Desk",c:"#380820",title:"Send to market",desc:"Broker sends package to carrier markets. All responses logged.",items:["Broker selects from brokerage market library (~40-45 markets)","Indication Received / Quote Received statuses update as responses arrive","Multiple markets worked simultaneously in one case record"]},"broker-info":{tag:"Brokerage Desk",c:"#380820",title:"More info needed",desc:"Broker requests info from agent. Creates agent-facing task.",items:["Request More Info: agent task created with specific items listed","Agent notification with items needed","Agent: Respond to Info Request  upload documents or complete fields directly"]},"broker-return":{tag:"Brokerage Desk",c:"#380820",title:"Return quote to agent",desc:"Broker sends market result to agent. Appears in Quote Comparison.",items:["Source label: AmSuisse Brokerage","Agent notification: brokerage quote ready to r
